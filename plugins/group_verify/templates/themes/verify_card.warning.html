<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xynrin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(255, 164, 27, 0.34), transparent 30%),
        linear-gradient(180deg, #fff4e6 0%, #ffe8cc 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #472601;
    }

    #verify-card {
      width: 620px;
      min-height: 400px;
      background: linear-gradient(180deg, #fffaf2 0%, #fff3df 100%);
      border: 2px solid #ffbf69;
      border-radius: 24px;
      box-shadow: 0 20px 48px rgba(183, 96, 8, 0.16);
      overflow: hidden;
      position: relative;
    }

    .stripe {
      height: 18px;
      background:
        repeating-linear-gradient(
          -45deg,
          #ff8c42 0,
          #ff8c42 18px,
          #ffd166 18px,
          #ffd166 36px
        );
    }

    .inner {
      padding: 24px 28px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 382px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.3;
      color: #8f3b00;
    }

    .timer {
      min-width: 150px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #ffd3a4;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 191, 105, 0.4);
    }

    .timer .label {
      font-size: 12px;
      color: #b45309;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .timer .value {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #7c2d12;
      line-height: 1.5;
    }

    .meta {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid #ffd8b3;
    }

    .meta-item .label {
      font-size: 13px;
      color: #9a3412;
    }

    .meta-item .value {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #5f370e;
      word-break: break-word;
    }

    .code-box {
      margin-top: 20px;
      position: relative;
      border-radius: 22px;
      padding: 22px 18px 24px;
      background: #fff;
      border: 2px dashed #ffb86a;
      overflow: hidden;
    }

    .code-box::before,
    .code-box::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 191, 105, 0.16);
    }

    .code-box::before {
      top: -96px;
      left: -50px;
    }

    .code-box::after {
      right: -60px;
      bottom: -92px;
    }

    .code-tip {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #b45309;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .code-text {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      text-align: center;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 14px;
      color: #7c2d12;
      padding-left: 14px;
      line-height: 1.1;
    }

    .footer {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 247, 237, 0.92);
      border: 1px solid #ffd8b3;
      font-size: 15px;
      line-height: 1.8;
      color: #7c2d12;
    }

    .footer strong {
      color: #9a3412;
    }
  </style>
</head>
<body>
  <div id="verify-card">
    <div class="stripe"></div>
    <div class="inner">
      <div>
        <div class="header-row">
          <div class="title">Xynrin进行中<br />请立即发送验证码</div>
          <div class="timer">
            <div class="label">过期时间</div>
            <div class="value">{{expire_time}}</div>
          </div>
        </div>

        <div class="meta">
          <div class="meta-item">
            <div class="label">用户 QQ</div>
            <div class="value">{{user_qq}}</div>
          </div>
          <div class="meta-item">
            <div class="label">群名称</div>
            <div class="value">{{group_name}}</div>
          </div>
        </div>

        <div class="code-box">
          <div class="code-tip">Type This Code In Group Chat</div>
          <div class="code-text">{{verify_code}}</div>
        </div>
      </div>

      <div class="footer">
        超时未验证将被自动移出群聊。<strong>不要截图转发，不要私聊机器人，直接在群内发送验证码文本。</strong>
      </div>
    </div>
  </div>
</body>
</html>

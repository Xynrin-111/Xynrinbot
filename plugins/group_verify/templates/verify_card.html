<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入群验证</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef1f4;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      padding: 16px;
    }

    #verify-card {
      width: 600px;
      height: 400px;
      background: #f7f8fa;
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(31, 35, 41, 0.12);
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .header {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: #222;
      line-height: 1.5;
    }

    .meta {
      margin-top: 10px;
      text-align: center;
      color: #666;
      font-size: 16px;
      line-height: 1.7;
    }

    .code-box {
      position: relative;
      height: 170px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffffff, #f1f3f5);
      border: 1px solid #d9dde3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .code-text {
      position: relative;
      z-index: 2;
      font-size: 60px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #1f2a37;
      text-align: center;
      padding-left: 10px;
    }

    .line {
      position: absolute;
      height: 2px;
      background: rgba(100, 116, 139, 0.35);
      z-index: 1;
      transform-origin: left center;
    }

    .line-1 {
      width: 320px;
      top: 42px;
      left: 80px;
      transform: rotate(8deg);
    }

    .line-2 {
      width: 280px;
      top: 110px;
      left: 150px;
      transform: rotate(-10deg);
    }

    .line-3 {
      width: 250px;
      top: 135px;
      left: 110px;
      transform: rotate(5deg);
    }

    .footer {
      text-align: center;
      color: #7b8087;
      font-size: 16px;
      line-height: 1.7;
    }

    .footer strong {
      color: #555;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      #verify-card {
        width: 100%;
        height: auto;
        min-height: 400px;
        padding: 24px;
      }

      .header {
        font-size: 20px;
      }

      .code-box {
        height: 150px;
      }

      .code-text {
        font-size: 48px;
        letter-spacing: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="verify-card">
    <div>
      <div class="header">【入群验证】请在5分钟内输入下方验证码</div>
      <div class="meta">
        用户 QQ：{{user_qq}}<br />
        群名称：{{group_name}}<br />
        过期时间：{{expire_time}}
      </div>
    </div>

    <div class="code-box">
      <div class="line line-1"></div>
      <div class="line line-2"></div>
      <div class="line line-3"></div>
      <div class="code-text">{{verify_code}}</div>
    </div>

    <div class="footer">
      超时未验证将被移出群聊，请勿泄露验证码<br />
      <strong>请直接在群内发送验证码文本完成验证</strong>
    </div>
  </div>
</body>
</html>
